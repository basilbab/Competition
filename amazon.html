    <script>
        let totalCount=5
        let cartCount=0
        let cartItem=[]
        let totalAmount=0
        let flag=0
        
        function deleteItem(id,name,price)
        {
            for(i=0;i<cartItem.length;i++)
            {   
                  if(cartItem[i].id===id)
                    {
                        flag=1
                        if(cartItem[i].qty===1)
                            cartItem = cartItem.filter(item => item.id !== id);                            
                        else
                            cartItem[i].qty=cartItem[i].qty-1
                       
                        totalCount=totalCount+1
                        cartCount=cartCount-1
                        
                        render()
                        break
                    }  
            }

           
        }
        function addItem(id,name,price)
        {
            flag=0
            for(i=0;i<cartItem.length;i++)
            {   
                  if(cartItem[i].id===id)
                    {
                        flag=1
                        cartItem[i].qty=cartItem[i].qty+1
                        render()
                        break
                    }  
            }
            if(flag)
            {
               const qty= cartItem[i].qty
            }
            else{
                const newItem={
                'id':id,
                'item':name,
                'price':price,
                'qty':1
            }
            cartItem.push(newItem)
            totalCount=totalCount-1
            cartCount=cartCount+1
            
           
            render()
            }
            
            
        }
        function render()
        {
             document.getElementById('item-list').innerHTML=''
            totalAmount=0
             for(let i=0;i<cartItem.length;i++)
            {
                const newItem=document.createElement('div')
                newItem.innerHTML=cartItem[i].item+'  '+cartItem[i].price+' '+cartItem[i].qty
                document.getElementById('item-list').appendChild(newItem)
                totalAmount=totalAmount+cartItem[i].price*cartItem[i].qty
                document.getElementById('total').innerHTML='Total='+totalAmount
            }
            const newLeft=document.getElementById('left')
            const newAdded=document.getElementById('added-item')
            newLeft.innerHTML='Total Item:'+totalCount
            newAdded.innerHTML='Added Item:'+cartCount
        }
    </script>
