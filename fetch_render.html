<html>
    <body>
        <button onclick="getData()">Get All Json</button>
        <div id="master">

        </div>
    </body>
    <script>
        function getData()
        {
            myFetch('https://jsonplaceholder.typicode.com/posts/')
            .then((data)=>{
              document.getElementById('master').innerHTML =
    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            })
            .catch((err)=>{
                console.log(err)
            })
        }
        function myFetch(url)
        {
            return new Promise((resolve,reject)=>{
                fetch(url)
                .then((response)=>response.json())
                .then((data)=>{
                    resolve(data)
                })
                .catch((err)=>{
                    reject(err)
                })
            })
        }
    </script>
</html>
